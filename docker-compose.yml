services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nippou_backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/nippou.db
    volumes:
      - nippou_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nippou_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8001}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  nippou_data:

